<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>LEJOG Virtual Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .tab { overflow: hidden; border: 1px solid #ccc; background-color: #f1f1f1; border-radius: 5px 5px 0 0; }
        .tab button { background-color: inherit; float: left; border: none; outline: none; cursor: pointer; padding: 14px 16px; transition: 0.3s; font-size: 17px; font-weight: bold; }
        .tab button:hover { background-color: #ddd; }
        .tab button.active { background-color: #4CAF50; color: white; }
        .tabcontent { display: none; padding: 20px 0; border: 1px solid #ccc; border-top: none; }
        iframe { width: 100%; height: 600px; border: none; }
        img { max-width: 100%; height: auto; display: block; margin: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚴 Virtual LEJOG Challenge 🚴</h2>
        
        <div class="tab">
            <button class="tablinks" onclick="openTab(event, 'Map')" id="defaultOpen">Live Map</button>
            <button class="tablinks" onclick="openTab(event, 'Chart')">Distance Chart</button>
        </div>

        <div id="Map" class="tabcontent">
            <iframe src="lejog_progress_map.html"></iframe>
        </div>

        <div id="Chart" class="tabcontent">
            <img src="progress_chart.png" alt="Progress Chart">
        </div>
    </div>

    <script>
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }
        // Automatically open the Map tab when the page loads
        document.getElementById("defaultOpen").click();
    </script>
</body>
</html>
